<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/eixo-mark.svg" type="image/svg+xml" />
  <title>EIXO WebGIS — Gestão Territorial Municipal</title>
  <meta name="description" content="WebGIS municipal: lotes, quadras, ruas e edificações com dashboard de gestão, mapa de calor e ortofoto." />

  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo-img" src="/assets/eixo-mark.svg" alt="EIXO" />
      <div class="brand-text">
        <strong>EIXO <span class="brand-accent">WebGIS</span></strong>
        <small>Soluções em Gestão Pública</small>
      </div>
    </div>
    <div class="top-actions">
      <button id="btn-camadas" class="btn mobile-only" aria-label="Camadas" title="Camadas">☰</button>
      <label class="field" id="campo-municipio" hidden>
        <span>Município</span>
        <select id="filtro-municipio"></select>
      </label>
      <label class="field">
        <span>Bairro</span>
        <select id="filtro-bairro"><option value="">Todos</option></select>
      </label>
      <button id="btn-dashboard" class="btn btn-primary" aria-pressed="true">
        <span class="ico">▦</span> <span class="btn-label">Dashboard</span>
      </button>
    </div>
  </header>

  <main class="layout">
    <!-- Painel de camadas / basemap / heatmap -->
    <aside class="panel controls" id="controls">
      <div class="panel-head">
        <span>Camadas</span>
        <button class="panel-toggle" data-target="controls-body" title="Recolher">–</button>
      </div>
      <div class="panel-body" id="controls-body">
        <fieldset>
          <legend>Camada base</legend>
          <div id="basemaps" class="radio-list"></div>
        </fieldset>

        <fieldset>
          <legend>Dados vetoriais</legend>
          <div id="overlays" class="check-list"></div>
          <select id="ruas-mode" class="select-full" title="Como colorir as ruas">
            <option value="situacao">Ruas: por pavimentação</option>
            <option value="tipo">Ruas: por tipo de pavimento</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>Mapa de calor</legend>
          <label class="switch-row">
            <input type="checkbox" id="heat-toggle" />
            <span>Ativar</span>
          </label>
          <select id="heat-metric" class="select-full">
            <option value="nao_pavimentadas">Ruas não pavimentadas</option>
            <option value="edificacoes">Densidade de edificações</option>
            <option value="lotes">Densidade de lotes</option>
          </select>
        </fieldset>
      </div>
    </aside>

    <div id="map"></div>

    <!-- Legenda -->
    <div class="legend" id="legend" hidden></div>

    <!-- Dashboard -->
    <section class="panel dashboard" id="dashboard">
      <div class="panel-head">
        <span>Painel do Gestor</span>
        <button class="panel-toggle" id="dashboard-close" title="Fechar">✕</button>
      </div>
      <div class="panel-body" id="dashboard-body">
        <div class="kpi-grid" id="kpis"></div>

        <div class="card">
          <h3>Pavimentação das vias</h3>
          <div class="pav-bar" id="pav-bar"></div>
          <div class="pav-stats" id="pav-stats"></div>
          <canvas id="chart-pav-status" height="150"></canvas>
        </div>

        <div class="card">
          <h3>Pavimentação por tipo (km)</h3>
          <canvas id="chart-pav-tipo" height="190"></canvas>
        </div>

        <div class="card alert" id="card-sem-pav">
          <h3>⚠ Bairros sem pavimentação</h3>
          <ul class="tag-list" id="lista-sem-pav"></ul>
        </div>

        <div class="card">
          <h3>Pavimentação por bairro (% da extensão)</h3>
          <canvas id="chart-pav-bairro" height="200"></canvas>
        </div>

        <div class="card">
          <h3>Uso do solo (lotes)</h3>
          <canvas id="chart-uso" height="200"></canvas>
        </div>
      </div>
    </section>
  </main>

  <!-- Overlay de carregamento / aviso -->
  <div class="overlay-msg" id="overlay-msg" hidden>
    <div class="overlay-card" id="overlay-card"></div>
  </div>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/vendor/leaflet.heat/leaflet-heat.js"></script>
  <script src="/vendor/chart/chart.umd.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
